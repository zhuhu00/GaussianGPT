# ScanNet++ v2 raw Gaussian scenes - VQ-VAE training and tokenization.
defaults:
  - points

dataset_name: spp_v2

data_path: ??? # per-scene Gaussian checkpoints
transforms_path: ??? # camera transforms

train_split: data_splits/spp_train.txt
val_split: data_splits/spp_val.txt

gaussian_subpath: ckpts/point_cloud_30000.ply

n_images: 12 # images loaded per scene for the re-rendering loss

max_points: 1000000000 # effectively uncapped
center_sample: false
voxel_size: 0.025

img_path: ??? # captured images (loaded, not rendered)
background_color: black

# Scenes are full floor-level Gaussians; chunk with camera-visibility masks
# rather than random subsampling.
chunk_subsample: false
chunk_shape: [20, 20, 20]
chunk_voxel_size: 0.2
min_chunk_occupancy: 0.2
max_chunk_attempts: 10
chunk_origin: [null, null, -1]
camera_chunk_min_area_ratio: 0.4
