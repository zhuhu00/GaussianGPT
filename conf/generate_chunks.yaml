# Top-level config for generate_chunks.py (single-chunk generation / evaluation).
# Pass the trained GPT via checkpoint=<gpt.ckpt> and a tokenized data=<cfg>.
defaults:
  - _self_
  - data: null
  - model: gpt
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

checkpoint: ???
checkpoint_timeout: 0
remove_checkpoint: false
vqvae_checkpoint: null
output_dir: outputs/eval
store_samples: false
render_gifs: true
gif_frames: 120
gif_fps: 24

num_samples: 1
batch_size: 4
temperature: 0.9
top_k: null
top_p: 0.9
background_color: null
seed: 0

dataset: null

completion:
  enabled: false
  split: val
  prompt_fraction: 0.5

hydra:
  output_subdir: null
  run:
    dir: .
