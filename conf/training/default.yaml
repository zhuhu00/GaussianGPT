# some reasonable defaults
lr: 1e-4
weight_decay: 0.0
accumulate_grad_batches: 1 # 1 means no / default accumulation
max_epochs: null # needs to be specified
batch_scenes: null # needs to be specified

# precision to use for training in lightning trainer argument
precision: 32-true

fast_dev_run: false # whether to do a fast dev run

log_every_n_steps: 50 # logging interval for Trainer

gradient_clip:
  algorithm: none # none | value | norm; clipping is disabled unless this is value/norm
  val: 4.0

grad_norm_log:
  frequency: 250 # Set to integer N to log gradient norm every N steps; null disables
  l2_only: true # Whether to only log L2 norm or all norms
  log_modules: false # Whether to log gradient norms for each module
  module_depth: null # Maximum depth of modules to log gradients for
  log_classes: false # aggregates and logs gradients for the corresponding class

device_stats_log:
  enabled: true # whether to enable device stats logging
  frequency: 50 # logging frequency in steps
  per_device: false # whether to log stats per device

free_cache:
  enabled: false # whether to enable regular freeing of cache memory
  frequency: 1 # frequency in steps to free cache

# LR schedule behavior (default is constant LR; optional kind: constant | cosine | linear_warmup_warmdown)
lr_schedule:
  kind: constant # constant | cosine | linear_warmup_warmdown
  total_epochs: null # null defaults to max_epochs (matches actual training duration)
  warmup_ratio: 0.0 # cosine and linear_warmup_warmdown
  warmdown_ratio: 0.5 # linear_warmup_warmdown only
  final_lr_frac: 0.1 # cosine and linear_warmup_warmdown

profiler:
  enabled: false # whether to enable the profiler
  type: simple # simple or advanced
